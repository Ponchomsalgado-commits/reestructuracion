<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitácora TDAH</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --bg: #f4f7fb;
      --surface: #ffffff;
      --primary: #4c6ef5;
      --secondary: #22b8cf;
      --accent: #fab005;
      --text: #102a43;
      --muted: #64748b;
    }
    * {box-sizing: border-box;}
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }
    header h1 {
      text-align: center;
      font-size: clamp(2rem, 2.5vw, 2.5rem);
      line-height: 1.1;
    }
    header p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 560px;
    }
    .section-card {
      background: var(--surface);
      border: 1px solid rgba(16, 42, 67, 0.08);
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08);
      padding: 24px;
      margin-bottom: 22px;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }
    label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
    }
    input[type="text"], input[type="date"], select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(16, 42, 67, 0.14);
      border-radius: 16px;
      font-size: 1rem;
      color: var(--text);
      background: #f9fbff;
    }
    textarea {
      min-height: 180px;
      resize: vertical;
    }
    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 20px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 24px rgba(16, 42, 67, 0.12);
      font-weight: 700;
    }
    button:hover {
      transform: translateY(-1px);
    }
    .primary {background: var(--primary); color: #ffffff;}
    .secondary {background: var(--secondary); color: #ffffff;}
    .accent {background: var(--accent); color: var(--text);}
    .tip-list {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }
    .tip-list li {
      margin-bottom: 10px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
    <header class="site-header">
        <h1>Bitácora de aula</h1>
    </header>

    <main>
        <section class="section-card">
            <h2>Resumen del día</h2>
            <div class="cards">
                <div>
                <label for="fecha">Fecha</label>
                <input type="date" id="fecha" name="fecha">
                </div>
                <div>
                <label for="estado">HJoy estuvo:</label>
                <select id="estado" name="estado">
                    <option>Enfocado</option>
                    <option>Activo</option>
                    <option>Inquieto</option>
                    <option>Necesita apoyo</option>
                </select>
                </div>
            </div>
            </section>
            <section class="section-card">
            <h2>Ficha del alumno</h2>
            <div class="cards">
                <div>
                <label for="alumno">Nombre del alumno</label>
                <input type="text" id="alumno" name="alumno" placeholder="Ej. Mateo Pérez">
                </div>
                <div>
                <label for="objetivo">Objetivo del día</label>
                <textarea id="objetivo" name="objetivo" placeholder="Escribe la meta específica para este alumno..."></textarea>
                </div>
            </div>
            </section>
            <section class="section-card">
            <h2>Observaciones y estrategias</h2>
            <label for="observaciones">Notas rápidas</label>
            <textarea id="observaciones" name="observaciones" placeholder="Anota comportamientos, apoyos, cambios en la rutina y otras referencias."></textarea>
            <div class="button-row">
                <button class="primary" type="button">Guardar nota</button>
                <button class="secondary" type="button">Limpiar campos</button>
                <button class="accent" type="button">Agregar nuevo</button>
            </div>
            </section>
            <section class="section-card">
            <h2>Consejos para el docente</h2>
            <ul class="tip-list">
                <li>Usa instrucciones breves y estructuradas.</li>
                <li>Introduce descansos cortos y puntos de transición.</li>
                <li>Observa y registra pequeños logros diarios.</li>
            </ul>
        </section>
    </main>
</body>
</html>
